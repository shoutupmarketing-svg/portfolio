<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SHOUTUP · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<style>
  .dash-shell { max-width: 1280px; margin: 0 auto; padding: 120px 32px 80px; }
  .dash-head { display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:40px; }
  .dash-head h1 { font-family: var(--fs-head); font-size: clamp(32px, 4.6vw, 48px); font-weight:600; letter-spacing:-0.03em; }
  .dash-head .sub { color: var(--text-dim); margin-top: 6px; font-size: 14px; }
  .kpi-row { display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px; }
  .kpi { border:1px solid var(--border);border-radius:var(--radius);padding:24px;background:var(--surface);backdrop-filter:blur(16px); }
  .kpi .lbl { font-family: var(--fs-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase; }
  .kpi .val { font-family: var(--fs-head); font-size: 36px; font-weight:700; margin-top: 10px; letter-spacing: -0.03em; }
  .kpi .val.accent { color: var(--accent); }
  .panel { border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;background:var(--surface);backdrop-filter:blur(16px);margin-bottom:24px; }
  .panel h2 { font-family: var(--fs-head); font-weight:600; font-size:22px; margin-bottom:20px; letter-spacing:-0.02em; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding: 14px 12px; font-size: 14px; border-bottom: 1px solid var(--border); }
  th { font-family: var(--fs-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; }
  .empty { color: var(--muted); font-family: var(--fs-mono); font-size: 12px; padding: 20px 0; }
  .role-badge { display:inline-block;padding:4px 10px;border-radius:999px;font-family:var(--fs-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;border:1px solid var(--border); }
  .role-badge.admin { background: var(--accent); color: #000; border-color: var(--accent); }
  @media (max-width:1024px){ .kpi-row{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:640px){ .kpi-row{grid-template-columns:1fr;} .panel{padding:22px;} }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb o1"></div>
<div class="bg-orb o2"></div>

<nav class="nav" id="nav">
  <a href="/" class="nav-brand" data-testid="dash-brand"><span class="dot"></span> SHOUT<span style="color:var(--accent)">UP</span></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/#contact">Support</a>
  </div>
  <div class="nav-cta">
    <span id="user-pill" style="font-family:var(--fs-mono);font-size:11px;color:var(--text-dim);letter-spacing:0.18em;text-transform:uppercase;"></span>
    <button class="btn btn-ghost" id="logout-btn" data-testid="logout-btn">Logout</button>
  </div>
</nav>

<div class="dash-shell">
  <div class="dash-head">
    <div>
      <h1 id="welcome">Welcome back</h1>
      <div class="sub" id="welcome-sub">Your SHOUTUP command center.</div>
    </div>
    <div><span class="role-badge" id="role-badge">CLIENT</span></div>
  </div>

  <div class="kpi-row" id="kpi-row">
    <div class="kpi"><div class="lbl">Leads (Your Account)</div><div class="val accent" id="k-leads">—</div></div>
    <div class="kpi"><div class="lbl">Messages Sent</div><div class="val" id="k-msgs">—</div></div>
    <div class="kpi"><div class="lbl">Active Packages</div><div class="val" id="k-pack">1</div></div>
    <div class="kpi"><div class="lbl">ROAS (30d)</div><div class="val accent" id="k-roas">5.8x</div></div>
  </div>

  <div class="panel">
    <h2>Recent Leads</h2>
    <div id="leads-table"><div class="empty">Loading…</div></div>
  </div>

  <div class="panel" id="admin-panel" style="display:none;">
    <h2>Contact Messages (Admin)</h2>
    <div id="msgs-table"><div class="empty">Loading…</div></div>
  </div>

  <div class="panel" id="admin-users" style="display:none;">
    <h2>Users (Admin)</h2>
    <div id="users-table"><div class="empty">Loading…</div></div>
  </div>
</div>

<script>
  const token = localStorage.getItem('shoutup_token');
  const user = JSON.parse(localStorage.getItem('shoutup_user') || 'null');
  if (!token || !user) { window.location.href = '/'; }

  document.getElementById('welcome').textContent = `Welcome back, ${user.name.split(' ')[0]}`;
  document.getElementById('welcome-sub').textContent = user.company ? `${user.company} · SHOUTUP command center.` : 'Your SHOUTUP command center.';
  document.getElementById('user-pill').textContent = user.email;
  const badge = document.getElementById('role-badge');
  badge.textContent = user.role.toUpperCase();
  if (user.role === 'admin') badge.classList.add('admin');

  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('shoutup_token');
    localStorage.removeItem('shoutup_user');
    window.location.href = '/';
  });

  const api = (p) => fetch('/api' + p, { headers: { Authorization: 'Bearer ' + token } }).then(async (r) => {
    if (r.status === 401) { localStorage.clear(); window.location.href = '/'; return; }
    return r.json();
  });

  const esc = (s) => (s == null ? '' : String(s).replace(/[&<>]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])));
  const fmtDate = (iso) => { try { return new Date(iso).toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' }); } catch { return iso; } };

  function renderTable(rows, cols, host) {
    if (!rows.length) { host.innerHTML = '<div class="empty">Nothing here yet.</div>'; return; }
    const head = '<tr>' + cols.map((c) => `<th>${c.label}</th>`).join('') + '</tr>';
    const body = rows.map((r) => '<tr>' + cols.map((c) => `<td>${esc(c.fmt ? c.fmt(r[c.k], r) : r[c.k])}</td>`).join('') + '</tr>').join('');
    host.innerHTML = `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
  }

  (async () => {
    // leads
    const myLeads = await api('/leads/mine');
    document.getElementById('k-leads').textContent = myLeads && myLeads.leads ? myLeads.leads.length : 0;
    renderTable(
      (myLeads && myLeads.leads) || [],
      [
        { k: 'name', label: 'Name' },
        { k: 'phone', label: 'Phone' },
        { k: 'city', label: 'City' },
        { k: 'service', label: 'Service' },
        { k: 'status', label: 'Status' },
        { k: 'created_at', label: 'Captured', fmt: fmtDate },
      ],
      document.getElementById('leads-table')
    );

    if (user.role === 'admin') {
      document.getElementById('admin-panel').style.display = '';
      document.getElementById('admin-users').style.display = '';
      const [msgs, users, stats] = await Promise.all([api('/admin/messages'), api('/admin/users'), api('/admin/stats')]);
      if (stats) { document.getElementById('k-msgs').textContent = stats.messages || 0; }
      renderTable(
        (msgs && msgs.messages) || [],
        [
          { k: 'name', label: 'From' },
          { k: 'email', label: 'Email' },
          { k: 'business', label: 'Business' },
          { k: 'message', label: 'Message', fmt: (v) => (v && v.length > 80 ? v.slice(0, 80) + '…' : v) },
          { k: 'created_at', label: 'Received', fmt: fmtDate },
        ],
        document.getElementById('msgs-table')
      );
      renderTable(
        (users && users.users) || [],
        [
          { k: 'name', label: 'Name' },
          { k: 'email', label: 'Email' },
          { k: 'company', label: 'Company' },
          { k: 'role', label: 'Role' },
          { k: 'created_at', label: 'Joined', fmt: fmtDate },
        ],
        document.getElementById('users-table')
      );
    } else {
      document.getElementById('k-msgs').textContent = '—';
    }
  })();
</script>
</body>
</html>
